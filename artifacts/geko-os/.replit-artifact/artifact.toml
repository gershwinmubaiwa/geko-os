kind = "web"
previewPath = "/"
title = "Geko OS"
version = "1.0.0"
id = "artifacts/geko-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19495

[services.development]
run = "pnpm --filter @workspace/geko-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/geko-os", "run", "build" ]
publicDir = "artifacts/geko-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19495"
BASE_PATH = "/"
